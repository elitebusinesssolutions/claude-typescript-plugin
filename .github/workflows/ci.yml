name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run validate-skill-evals -- origin/${{ github.base_ref }}

      - run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc
          source ~/.bashrc
          claude plugin validate .
        if: matrix.os == 'ubuntu-latest'
        name: claude plugin validate (ubuntu)

